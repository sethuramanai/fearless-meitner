name: TaskFlow CI-CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Code Linting with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Code Formatting with black
      run: |
        # Run black formatting verification
        black --check . --exclude '/(\.git|\.venv)/'

    - name: Check Django Migrations
      run: |
        python manage.py makemigrations --check --dry-run

    - name: Run Django Unit Tests
      run: |
        python manage.py test


  build-docker-and-push:
    needs: lint-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image
        run:  docker build . -t ${{ secrets.DOCKERHUB_USERNAME }}/todo-app:latest

      - name: push image to dockerhub
        run: |
              docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p  ${{ secrets.DOCKERHUB_TOKEN }}
              docker push ${{ secrets.DOCKERHUB_USERNAME }}/todo-app:latest
       
  deploy:
    needs: build-docker-and-push
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
           RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service fearless-meitner
